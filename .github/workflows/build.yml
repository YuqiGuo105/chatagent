name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: chatagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    strategy:
      matrix:
        java-version: ['21']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
        cache: 'maven'

    - name: Initialize database
      run: |
        PGPASSWORD=postgres psql -h localhost -U postgres -d chatagent_test \
          -c "CREATE EXTENSION IF NOT EXISTS vector;"

    - name: Build with Maven (skip tests)
      run: ./mvnw clean package -B -V -DskipTests

    - name: Run tests
      run: ./mvnw test -B
      continue-on-error: true
      env:
        SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/chatagent_test
        SPRING_DATASOURCE_USERNAME: postgres
        SPRING_DATASOURCE_PASSWORD: postgres
        SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

    - name: Generate test report
      uses: dorny/test-reporter@v1
      if: always()
      continue-on-error: true
      with:
        name: JUnit Tests
        path: '**/target/surefire-reports/TEST-*.xml'
        reporter: 'java-junit'
        fail-on-error: false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: '**/target/site/jacoco/jacoco.xml'
        fail_ci_if_error: false

    - name: Archive build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts-${{ matrix.java-version }}
        path: '**/target/*.jar'
        if-no-files-found: warn
        retention-days: 5

    - name: Log build completion
      run: |
        echo "✅ Build completed successfully!"
        echo "Java version: ${{ matrix.java-version }}"
        echo "Build timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
